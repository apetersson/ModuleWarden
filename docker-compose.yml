services:
  # ── Data Layer ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: modulewarden
      POSTGRES_USER: modulewarden
      POSTGRES_PASSWORD: modulewarden
    ports:
      - "5422:5432"
    volumes:
      - ${MW_LOCALDATA_ROOT:-../localdata}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modulewarden -d modulewarden"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backing Registry ────────────────────────────────────
  verdaccio:
    image: verdaccio/verdaccio:latest
    expose:
      - "4873"
    volumes:
      - ${MW_LOCALDATA_ROOT:-../localdata}/verdaccio:/verdaccio/storage
      - ./infra/verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro
    # Developers do NOT talk directly to Verdaccio.
    # ModuleWarden is the gate. This service is internal.
    # It is exposed only on the Compose network for ModuleWarden services.

  # ── Search Broker ───────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    expose:
      - "8080"
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET: ${MW_SEARXNG_SECRET:-modulewarden-local-searxng-change-me}
    volumes:
      - ./infra/searxng:/etc/searxng
      - ${MW_LOCALDATA_ROOT:-../localdata}/searxng:/var/cache/searxng
    # Internal-only search broker for audit containers via api-proxy.
    # Do not expose this directly to the host by default.

  # ── Control Plane ───────────────────────────────────────
  api-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-proxy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://modulewarden:modulewarden@postgres:5432/modulewarden?schema=public
      MW_POSTGRES_HOST: postgres
      MW_POSTGRES_PORT: "5432"
      MW_POSTGRES_DB: modulewarden
      MW_POSTGRES_USER: modulewarden
      MW_POSTGRES_PASSWORD: modulewarden
      MW_VERDACCIO_HOST: verdaccio
      MW_VERDACCIO_PORT: "4873"
      MW_VERDACCIO_URL: ${MW_VERDACCIO_URL:?MW_VERDACCIO_URL is required — set it in .env to the internal Verdaccio registry URL}
      MW_VERDACCIO_TOKEN: ${MW_VERDACCIO_TOKEN:?MW_VERDACCIO_TOKEN is required — set it in .env to a Verdaccio publish token}
      MW_SEARCH_PROVIDER: ${MW_SEARCH_PROVIDER:-searxng}
      MW_SEARXNG_URL: ${MW_SEARXNG_URL:-http://searxng:8080}
      MW_MODEL_ENDPOINT_BASE_URL: ${MW_MODEL_ENDPOINT_BASE_URL:?MW_MODEL_ENDPOINT_BASE_URL is required — set it in .env to point at an OpenAI-compatible /v1 endpoint}
      MW_MODEL_ENDPOINT_API_KEY: ${MW_MODEL_ENDPOINT_API_KEY:?MW_MODEL_ENDPOINT_API_KEY is required — set it in .env to the endpoint credential}
      MW_MODEL_ENDPOINT_MODEL: ${MW_MODEL_ENDPOINT_MODEL:?MW_MODEL_ENDPOINT_MODEL is required — set it in .env to a model slug (e.g. deepseek-chat)}
      MW_AUTH_ADMIN_TOKENS: ${MW_AUTH_ADMIN_TOKENS:-mw-admin-token-change-me}
      MW_AUTH_DEV_TOKENS: ${MW_AUTH_DEV_TOKENS:-mw-dev-token-change-me}
      MW_AUDIT_WORKSPACE_ROOT: ${MW_HOST_LOCALDATA_ROOT:-/Users/andreas/code/ModuleWarden/localdata}/audits/workspaces
      MW_AUDIT_SESSION_ARCHIVE_ROOT: ${MW_HOST_LOCALDATA_ROOT:-/Users/andreas/code/ModuleWarden/localdata}/audits/sessions
    volumes:
      - ${MW_LOCALDATA_ROOT:-../localdata}:${MW_HOST_LOCALDATA_ROOT:-/Users/andreas/code/ModuleWarden/localdata}:ro
    depends_on:
      postgres:
        condition: service_healthy
      verdaccio:
        condition: service_started
      searxng:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    ports:
      - "9090:9090"
    environment:
      DATABASE_URL: postgresql://modulewarden:modulewarden@postgres:5432/modulewarden?schema=public
      MW_POSTGRES_HOST: postgres
      MW_POSTGRES_PORT: "5432"
      MW_POSTGRES_DB: modulewarden
      MW_POSTGRES_USER: modulewarden
      MW_POSTGRES_PASSWORD: modulewarden
      MW_VERDACCIO_HOST: verdaccio
      MW_VERDACCIO_PORT: "4873"
      MW_VERDACCIO_URL: ${MW_VERDACCIO_URL:?MW_VERDACCIO_URL is required — set it in .env to the internal Verdaccio registry URL}
      MW_VERDACCIO_TOKEN: ${MW_VERDACCIO_TOKEN:?MW_VERDACCIO_TOKEN is required — set it in .env to a Verdaccio publish token}
      MW_SEARCH_PROVIDER: ${MW_SEARCH_PROVIDER:-searxng}
      MW_SEARXNG_URL: ${MW_SEARXNG_URL:-http://searxng:8080}
      MW_MODEL_ENDPOINT_BASE_URL: ${MW_MODEL_ENDPOINT_BASE_URL:?MW_MODEL_ENDPOINT_BASE_URL is required — set it in .env}
      MW_MODEL_ENDPOINT_API_KEY: ${MW_MODEL_ENDPOINT_API_KEY:?MW_MODEL_ENDPOINT_API_KEY is required — set it in .env}
      MW_MODEL_ENDPOINT_MODEL: ${MW_MODEL_ENDPOINT_MODEL:?MW_MODEL_ENDPOINT_MODEL is required — set it in .env}
      MW_AUTH_ADMIN_TOKENS: ${MW_AUTH_ADMIN_TOKENS:-mw-admin-token-change-me}
      MW_AUTH_DEV_TOKENS: ${MW_AUTH_DEV_TOKENS:-mw-dev-token-change-me}
      MW_API_BASE: ${MW_AUDIT_API_BASE:-http://host.docker.internal:8080}
      MW_AUDIT_IMAGE: modulewarden-audit-runner
      MW_JOB_CONCURRENCY_PACKAGE_REVIEW: ${MW_JOB_CONCURRENCY_PACKAGE_REVIEW:-4}
      MW_JOB_CONCURRENCY_AUDIT_CONTAINER_EXEC: ${MW_JOB_CONCURRENCY_AUDIT_CONTAINER_EXEC:-8}
      MW_AUDIT_WORKSPACE_ROOT: ${MW_HOST_LOCALDATA_ROOT:-/Users/andreas/code/ModuleWarden/localdata}/audits/workspaces
      MW_PRESERVE_AUDIT_SESSIONS: "true"
      MW_AUDIT_SESSION_ARCHIVE_ROOT: ${MW_HOST_LOCALDATA_ROOT:-/Users/andreas/code/ModuleWarden/localdata}/audits/sessions
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${MW_LOCALDATA_ROOT:-../localdata}:${MW_HOST_LOCALDATA_ROOT:-/Users/andreas/code/ModuleWarden/localdata}
    depends_on:
      postgres:
        condition: service_healthy
      verdaccio:
        condition: service_started
      searxng:
        condition: service_started

  # ── Web UI ──────────────────────────────────────────────
  web-ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-ui
      args:
        # This URL is baked into the browser bundle, so it must be reachable
        # from the host browser rather than only from inside Compose.
        VITE_MW_API_BASE_URL: ${MW_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    environment:
      MW_API_BASE_URL: http://localhost:8080
    depends_on:
      - api-proxy

  # ── Audit Runner Image Build ────────────────────────────
  # This is a build target only; it produces the image used by worker
  # for disposable PI audit containers.
  audit-runner:
    image: modulewarden-audit-runner
    build:
      context: .
      dockerfile: packages/audit-runner/Dockerfile
    # No ports needed; this is an image build target.
    # The worker references this image by name.
    # Run: docker compose build audit-runner

  # ── External Model Endpoint (default should be remote H100 service) ─────────
  # Not started by default. Enable intentionally with:
  # docker compose --profile local-model-endpoint up model-endpoint
  model-endpoint:
    image: ghcr.io/localai/localai:latest
    profiles: [ "local-model-endpoint" ]
    ports:
      - "8081:8080"
    environment:
      - MODELS=llama-3-70b,llama-3-8b
    command: ["--models-path", "/models", "--listen", "0.0.0.0:8080"]
    volumes:
      - ${MW_LOCALDATA_ROOT:-../localdata}/models-cache:/models
    # Not required for basic Compose startup.
    # Configure MW_MODEL_ENDPOINT_BASE_URL to skip this.
