use_default_settings: true

general:
  instance_name: "ModuleWarden Search"

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "modulewarden-local-searxng-change-me"
  limiter: false
  image_proxy: false
  bind_address: "0.0.0.0"
  port: 8080

ui:
  static_use_hash: true

outgoing:
  request_timeout: 8.0
  max_request_timeout: 12.0
  pool_connections: 50
  pool_maxsize: 20
