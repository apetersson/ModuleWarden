# SFT overrides for Qwen3.6-27B-Instruct (ModuleWarden auditor v1).
# Pass with: --config finetune/python/training/sft_config_qwen36.yaml
# (consumed by your launcher script; the sft_lora CLI accepts all of these as flags).

base_model: Qwen/Qwen3.6-27B-Instruct
max_seq_len: 8192
# 27B forces a small per-device batch on H100s even at bf16; grad_accum
# compensates so the effective batch matches the 32x16=512 target.
batch_size: 2
grad_accum: 16
epochs: 2
lr: 1.0e-4
warmup_ratio: 0.03
weight_decay: 0.0
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
# Qwen3.x decoder layers expose the standard Llama-style projection names.
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
bf16: true
gradient_checkpointing: true
packing: true
save_steps: 250
eval_steps: 250
logging_steps: 10
optim: adamw_torch
load_in_4bit: false
