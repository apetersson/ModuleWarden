# Accelerate config for 8 nodes x 8 H100 = 64 GPUs with FSDP sharding.
# Launch on the head node with:
#
#   accelerate launch \
#       --config_file apiary_train/accelerate_multinode.yaml \
#       --num_processes 64 \
#       --num_machines 8 \
#       --main_process_ip $HEAD_NODE_IP \
#       --main_process_port 29500 \
#       --machine_rank $SLURM_NODEID \
#       -m apiary_train.sft_lora ...
#
# The slurm wrapper in slurm/abliterate_then_sft.slurm fills the env vars.

compute_environment: LOCAL_MACHINE
distributed_type: FSDP
downcast_bf16: 'no'
fsdp_config:
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_cpu_ram_efficient_loading: true
  fsdp_forward_prefetch: true
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_state_dict_type: SHARDED_STATE_DICT
  fsdp_sync_module_states: true
  fsdp_use_orig_params: true
  # Layer class auto-detected by accelerate when set to empty string.
  # If FSDP wrapping complains about unknown classes, override per model:
  #   GLM:      GLMDecoderLayer
  #   DeepSeek: DeepseekV4DecoderLayer
  #   Qwen:     Qwen2DecoderLayer
  fsdp_transformer_layer_cls_to_wrap: ''
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 8
num_processes: 64
rdzv_backend: c10d
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
