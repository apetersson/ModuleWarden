        date: "2022-12-30"
        url: "https://pytorch.org/blog/compromised-nightly-dependency/"
    description: |
      An attacker registers a public PyPI package matching the name of a
      company's internal package, often at a higher version number. When
      pip resolves dependencies without a strict index restriction (the
      `--index-url` vs `--extra-index-url` distinction), it can prefer
      the public version. This is the PyPI analogue of the npm
      dependency-confusion attack class. The torchtriton case in
      December 2022 hit PyTorch nightly users for two days.
    indicators:
      - package name resembles an internal corporate prefix
      - very high version number (9999.x) to win pip's resolver
      - no project description or release notes
      - setup.py phones home from inside the install
      - author email field uses a free-mail domain
    injection_template_py: |
