services:
  tester:
    build: .
    image: modulewarden-sample-bad-deps:test
    container_name: mw-sample-bad-deps-tester
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,mode=1777
      - /work/node_modules:rw,size=128m,mode=1777
    networks:
      - mw-gate-net
    environment:
      # api-proxy is the production service name; the test reaches it via the
      # shared network from docker-compose.yml at the repo root.
      MW_GATE_BASE_URL: http://api-proxy:8080
      MW_GATE_STATUS_PATH: /admin/status
      MW_TEST_FAIL_ON_SCRIPT_EXECUTION: "true"
    # The container has no public internet egress; it joins the production
    # stack's bridge network and talks only to api-proxy on it. To run this
    # test, the production stack MUST be up first:
    #     COMPOSE_PROJECT_NAME=modulewarden docker compose up -d
    # The COMPOSE_PROJECT_NAME pin makes the network deterministically
    # `modulewarden_default` regardless of the repo directory name.

networks:
  mw-gate-net:
    name: modulewarden_default
    external: true
