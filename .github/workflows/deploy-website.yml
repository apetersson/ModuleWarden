# ── Deploy static website to GitHub Pages ────────────────────
# Triggered on pushes to main that touch website/ and on manual dispatch.
# The website/ directory is already static (HTML + CSS + assets, no build step).

name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - website/**
  workflow_dispatch:

# Grants the GITHUB_TOKEN permission to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs for the same group.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
